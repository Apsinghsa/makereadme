<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MakeReadme — Studio</title>
  <style>
    :root {
      --bg: #201d1d;
      --surface: #302c2c;
      --surface-warm: var(--surface);
      --fg: #fdfcfc;
      --fg-2: #c8c6c4;
      --muted: #9a9898;
      --meta: #6e6e73;
      --border: #464343;
      --border-soft: #302c2c;
      --accent: #007aff;
      --accent-on: #ffffff;
      --accent-hover: #0056b3;
      --accent-active: #004085;
      --success: #30d158;
      --warn: #ff9f0a;
      --danger: #ff3b30;
      --font-display: "Berkeley Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --font-body: "Berkeley Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --font-mono: "Berkeley Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 18px;
      --text-xl: 22px;
      --text-2xl: 28px;
      --text-3xl: 38px;
      --text-4xl: 48px;
      --leading-body: 1.5;
      --leading-tight: 1.0;
      --tracking-display: 0em;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --section-y-desktop: 80px;
      --section-y-tablet: 64px;
      --section-y-phone: 48px;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-pill: 9999px;
      --elev-flat: none;
      --elev-ring: 0 0 0 1px var(--border);
      --elev-raised: 0 0 0 2px var(--border);
      --focus-ring: 0 0 0 2px var(--accent);
      --motion-fast: 100ms;
      --motion-base: 150ms;
      --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      --container-max: 880px;
      --container-gutter-desktop: 24px;
      --container-gutter-tablet: 20px;
      --container-gutter-phone: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--leading-body);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--accent); }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    h1, h2, h3, p { margin: 0; }
    h1, h2, h3 { font-family: var(--font-display); text-wrap: balance; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }
    .topbar {
      min-height: 64px;
      display: grid;
      grid-template-columns: auto minmax(280px, 1fr) auto;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .logo { font-weight: 700; text-decoration: none; color: var(--fg); }
    .command-group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2);
    }
    .input, .editor {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--fg);
      outline: none;
    }
    .input {
      min-height: 40px;
      padding: var(--space-2) var(--space-3);
    }
    .input::placeholder, .editor::placeholder { color: var(--meta); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: var(--space-1) var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--fg);
      font-weight: 500;
      line-height: 2;
      text-decoration: none;
      transition: background var(--motion-base) var(--ease-standard), border-color var(--motion-base) var(--ease-standard), color var(--motion-base) var(--ease-standard);
    }
    .btn:hover { border-color: var(--fg-2); color: var(--fg); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-on); }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: var(--accent-on); }
    .btn-primary:active { background: var(--accent-active); border-color: var(--accent-active); }
    .btn:focus-visible, .input:focus-visible, .editor:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .actions { display: flex; justify-content: flex-end; gap: var(--space-2); }
    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: calc(100vh - 65px);
    }
    .sidebar {
      border-right: 1px solid var(--border);
      padding: var(--space-5);
      background: var(--bg);
      overflow: auto;
    }
    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--surface);
    }
    .section-title {
      color: var(--muted);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
    }
    .control-section + .control-section {
      border-top: 1px solid var(--border);
      padding-top: var(--space-5);
      margin-top: var(--space-5);
    }
    .check-list, .badge-list {
      display: grid;
      gap: var(--space-2);
    }
    .check-item, .badge-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-height: 36px;
      padding: var(--space-1) var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg-2);
      background: var(--surface);
      font-size: var(--text-sm);
    }
    .check-item input { accent-color: var(--accent); }
    .badge-btn { justify-content: space-between; width: 100%; }
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--success);
    }
    .builder {
      display: grid;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }
    .status-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: var(--space-4);
      color: var(--muted);
      font-size: var(--text-sm);
    }
    .status-card strong { color: var(--fg); }
    .workspace-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .workspace-title { display: grid; gap: var(--space-1); }
    .workspace-title h1 { font-size: var(--text-xl); line-height: 1.25; }
    .meta { color: var(--muted); font-size: var(--text-sm); }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .segmented button {
      min-height: 36px;
      padding: 0 var(--space-3);
      border: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button[aria-pressed="true"] { color: var(--fg); background: var(--bg); }
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      padding: var(--space-5);
      min-height: 0;
    }
    .pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--bg);
      overflow: hidden;
    }
    .pane-head {
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: var(--text-sm);
    }
    .editor {
      height: 100%;
      min-height: 520px;
      resize: none;
      border: 0;
      border-radius: 0;
      padding: var(--space-5);
      line-height: 1.55;
      background: var(--bg);
    }
    .preview {
      padding: var(--space-5);
      overflow: auto;
      color: var(--fg-2);
    }
    .preview h1 {
      color: var(--fg);
      font-size: var(--text-2xl);
      line-height: 1.25;
      margin-bottom: var(--space-3);
    }
    .preview h2 {
      color: var(--fg);
      font-size: var(--text-lg);
      margin-top: var(--space-6);
      margin-bottom: var(--space-2);
      border-top: 1px solid var(--border);
      padding-top: var(--space-4);
    }
    .preview p, .preview li { color: var(--fg-2); }
    .preview pre {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-3);
      overflow: auto;
      background: var(--surface);
      color: var(--fg);
    }
    .preview code { color: var(--fg); }
    .md-badge {
      display: inline-block;
      height: 20px;
      margin: 0 var(--space-2) var(--space-2) 0;
      vertical-align: middle;
    }
    .hidden { display: none; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-5);
      }
      .control-section + .control-section { border-top: 0; padding-top: 0; margin-top: 0; }
    }
    @media (max-width: 820px) {
      .topbar { grid-template-columns: 1fr; }
      .command-group { grid-template-columns: 1fr; }
      .sidebar { grid-template-columns: 1fr; }
      .workspace-head { align-items: flex-start; flex-direction: column; }
      .panes { grid-template-columns: 1fr; padding: var(--space-4); }
      .pane.hidden-mobile { display: none; }
      .editor { min-height: 420px; }
    }
  </style>
</head>
<body>
  <header class="topbar" data-od-id="topbar">
    <a class="logo" href="index.html">MakeReadme</a>
    <form class="command-group" id="generate-form">
      <label class="sr-only" for="repo-url">Repository URL</label>
      <input class="input" id="repo-url" type="url" value="https://github.com/user/repo" />
      <button class="btn btn-primary" type="submit">Generate</button>
    </form>
    <div class="actions">
      <button class="btn" id="copy-btn" type="button">Copy</button>
      <button class="btn" id="download-btn" type="button">Download</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" data-od-id="sidebar">
      <section class="control-section" data-od-id="section-controls">
        <h2 class="section-title">Sections</h2>
        <div class="check-list" id="section-list">
          <label class="check-item"><input type="checkbox" checked value="Title" />Title</label>
          <label class="check-item"><input type="checkbox" checked value="Description" />Description</label>
          <label class="check-item"><input type="checkbox" checked value="TOC" />TOC</label>
          <label class="check-item"><input type="checkbox" checked value="Features" />Features</label>
          <label class="check-item"><input type="checkbox" checked value="Installation" />Installation</label>
          <label class="check-item"><input type="checkbox" checked value="Usage" />Usage</label>
          <label class="check-item"><input type="checkbox" value="Tests" />Tests</label>
          <label class="check-item"><input type="checkbox" value="License" />License</label>
        </div>
      </section>

      <section class="control-section" data-od-id="badge-controls">
        <h2 class="section-title">Badges</h2>
        <div class="badge-list">
          <button class="badge-btn" type="button" data-badge="React"><span>React</span><span class="badge-dot"></span></button>
          <button class="badge-btn" type="button" data-badge="TypeScript"><span>TypeScript</span><span class="badge-dot"></span></button>
          <button class="badge-btn" type="button" data-badge="Node.js"><span>Node.js</span><span class="badge-dot"></span></button>
          <button class="badge-btn" type="button" data-badge="Python"><span>Python</span><span class="badge-dot"></span></button>
        </div>
        <div class="builder">
          <input class="input" id="custom-badge" type="text" placeholder="Custom badge label" />
          <button class="btn" id="add-badge" type="button">Add badge</button>
        </div>
      </section>

      <section class="control-section" data-od-id="document-status">
        <h2 class="section-title">Document</h2>
        <div class="status-card">
          <p><strong id="line-count">42</strong> lines</p>
          <p><strong id="section-count">6</strong> active sections</p>
          <p id="save-state">Ready to edit</p>
        </div>
      </section>
    </aside>

    <main class="workspace" data-od-id="workspace">
      <div class="workspace-head">
        <div class="workspace-title">
          <h1>README Studio</h1>
          <p class="meta">Edit generated Markdown and preview the rendered structure before export.</p>
        </div>
        <div class="segmented" aria-label="View mode">
          <button type="button" data-mode="editor" aria-pressed="false">Editor</button>
          <button type="button" data-mode="split" aria-pressed="true">Split</button>
          <button type="button" data-mode="preview" aria-pressed="false">Preview</button>
        </div>
      </div>

      <section class="panes" data-od-id="editor-preview">
        <article class="pane" id="editor-pane">
          <div class="pane-head"><span>EDITOR</span><span id="editor-state">synced</span></div>
          <textarea class="editor" id="markdown" spellcheck="false"># makereadme-cli

Generate a useful README from a GitHub repository URL.

## Features

- Scan repository signals before writing the README
- Choose which sections should appear in the final document
- Add language and framework badges
- Edit Markdown beside a rendered preview

## Installation

```bash
npm install makereadme-cli
```

## Usage

```bash
makereadme https://github.com/user/repo
```

## Configuration

Use the studio controls to tune section length, badges, and export format.
</textarea>
        </article>

        <article class="pane" id="preview-pane">
          <div class="pane-head"><span>PREVIEW</span><span id="preview-state">live</span></div>
          <div class="preview" id="preview"></div>
        </article>
      </section>
    </main>
  </div>

  <script>
    const markdown = document.getElementById("markdown");
    const preview = document.getElementById("preview");
    const lineCount = document.getElementById("line-count");
    const sectionCount = document.getElementById("section-count");
    const saveState = document.getElementById("save-state");
    const editorPane = document.getElementById("editor-pane");
    const previewPane = document.getElementById("preview-pane");
    const copyBtn = document.getElementById("copy-btn");
    const downloadBtn = document.getElementById("download-btn");
    const generateForm = document.getElementById("generate-form");
    const repoUrl = document.getElementById("repo-url");
    const customBadge = document.getElementById("custom-badge");

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderMarkdown(source) {
      const lines = source.split("\n");
      let html = "";
      let inList = false;
      let inCode = false;
      let codeLines = [];

      function closeList() {
        if (inList) {
          html += "</ul>";
          inList = false;
        }
      }

      lines.forEach((line) => {
        if (line.startsWith("```")) {
          if (inCode) {
            html += `<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`;
            codeLines = [];
            inCode = false;
          } else {
            closeList();
            inCode = true;
          }
          return;
        }

        if (inCode) {
          codeLines.push(line);
          return;
        }

        if (line.startsWith("# ")) {
          closeList();
          html += `<h1>${escapeHtml(line.slice(2))}</h1>`;
        } else if (line.startsWith("## ")) {
          closeList();
          html += `<h2>${escapeHtml(line.slice(3))}</h2>`;
        } else if (line.startsWith("![")) {
          closeList();
          const alt = line.slice(2, line.indexOf("]"));
          const src = line.slice(line.indexOf("(") + 1, line.lastIndexOf(")"));
          html += `<img class="md-badge" src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" loading="lazy" />`;
        } else if (line.startsWith("- ")) {
          if (!inList) {
            html += "<ul>";
            inList = true;
          }
          html += `<li>${escapeHtml(line.slice(2))}</li>`;
        } else if (line.trim()) {
          closeList();
          html += `<p>${escapeHtml(line)}</p>`;
        } else {
          closeList();
        }
      });

      closeList();
      return html;
    }

    function updatePreview() {
      const value = markdown.value;
      preview.innerHTML = renderMarkdown(value);
      lineCount.textContent = String(value.split("\n").length);
      sectionCount.textContent = String((value.match(/^## /gm) || []).length + 1);
      saveState.textContent = "Edited locally";
    }

    function setMode(mode) {
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
      });
      editorPane.classList.toggle("hidden", mode === "preview");
      previewPane.classList.toggle("hidden", mode === "editor");
      editorPane.classList.toggle("hidden-mobile", mode === "preview");
      previewPane.classList.toggle("hidden-mobile", mode === "editor");
      const compact = window.matchMedia("(max-width: 820px)").matches;
      document.querySelector(".panes").style.gridTemplateColumns = mode === "split" && !compact ? "1fr 1fr" : "1fr";
    }

    const badgePresets = {
      React: "https://img.shields.io/badge/React-61DAFB?logo=react&logoColor=000",
      TypeScript: "https://img.shields.io/badge/TypeScript-3178C6?logo=typescript&logoColor=fff",
      "Node.js": "https://img.shields.io/badge/Node.js-339933?logo=nodedotjs&logoColor=fff",
      Python: "https://img.shields.io/badge/Python-3776AB?logo=python&logoColor=fff"
    };

    function badgeMarkdown(label, url) {
      return `![${label}](${url})`;
    }

    function customBadgeUrl(label) {
      const slug = encodeURIComponent(label.replace(/\s+/g, "_"));
      return `https://img.shields.io/badge/${slug}-ready-brightgreen`;
    }

    markdown.addEventListener("input", updatePreview);

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    document.querySelectorAll("#section-list input").forEach((input) => {
      input.addEventListener("change", () => {
        const active = Array.from(document.querySelectorAll("#section-list input:checked")).map((item) => item.value);
        sectionCount.textContent = String(active.length);
        saveState.textContent = `${active.length} sections selected`;
      });
    });

    document.querySelectorAll("[data-badge]").forEach((button) => {
      button.addEventListener("click", () => {
        const label = button.dataset.badge;
        markdown.value = markdown.value.replace("\n\n## Features", `\n\n${badgeMarkdown(label, badgePresets[label])}\n\n## Features`);
        updatePreview();
      });
    });

    document.getElementById("add-badge").addEventListener("click", () => {
      const label = customBadge.value.trim();
      if (!label) return;
      markdown.value = markdown.value.replace("\n\n## Features", `\n\n${badgeMarkdown(label, customBadgeUrl(label))}\n\n## Features`);
      customBadge.value = "";
      updatePreview();
    });

    generateForm.addEventListener("submit", (event) => {
      event.preventDefault();
      markdown.value = `# ${repoUrl.value.split("/").filter(Boolean).pop() || "project-name"}

Generated README draft for ${repoUrl.value}.

## Features

- Repository-aware outline
- Editable Markdown source
- Live rendered preview
- Copy and download export

## Installation

\`\`\`bash
npm install
\`\`\`

## Usage

\`\`\`bash
npm run dev
\`\`\`

## Configuration

Document required environment variables and repository-specific setup here.`;
      saveState.textContent = "Generated from repository URL";
      updatePreview();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(markdown.value);
        saveState.textContent = "Copied README to clipboard";
      } catch {
        markdown.select();
        document.execCommand("copy");
        saveState.textContent = "Copied README from editor selection";
      }
    });

    downloadBtn.addEventListener("click", () => {
      const blob = new Blob([markdown.value], { type: "text/markdown" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "README.md";
      link.click();
      URL.revokeObjectURL(url);
      saveState.textContent = "Downloaded README.md";
    });

    updatePreview();
    setMode("split");
    window.addEventListener("resize", () => {
      const activeMode = document.querySelector("[data-mode][aria-pressed='true']").dataset.mode;
      setMode(activeMode);
    });
  </script>
</body>
</html>
